name: sn_radar

# Batch 4 — Stacker News Opportunity Radar v2 (2026-05-03)
# 每 15 分鐘 T1 (15 subs)；每小時 T1+T2 (36 subs)；每日 T1+T2+T3 (58 subs)
# 累積 SIGNAL / SELF_POST_OPP 至 data/sn_targets_accumulated/

on:
  schedule:
    - cron: '3,18,33,48 * * * *'   # T1 every 15 min
    - cron: '7 * * * *'             # T1+T2 hourly (off-peak vs above)
    - cron: '11 6 * * *'            # T1+T2+T3 daily 06:11Z
  workflow_dispatch:
    inputs:
      tier:
        description: 'tier(s) e.g. 1 / 1,2 / 1,2,3'
        required: false
        default: '1'

concurrency:
  group: sn-radar
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Pick tier from schedule
        id: tier
        run: |
          INPUT="${{ inputs.tier }}"
          CRON="${{ github.event.schedule }}"
          if [ -n "$INPUT" ]; then
            TIER="$INPUT"
          elif [ "$CRON" = "11 6 * * *" ]; then
            TIER="1,2,3"
          elif [ "$CRON" = "7 * * * *" ]; then
            TIER="1,2"
          else
            TIER="1"
          fi
          echo "tier=$TIER" >> $GITHUB_OUTPUT
          echo "running tier: $TIER"

      - name: Run radars
        id: radar
        run: |
          mkdir -p data/sn_opportunities data/sn_targets_accumulated data/polar_opportunities
          
          # SN Radar
          OUT_DIR=data/sn_opportunities \
          ACCUM_DIR=data/sn_targets_accumulated \
          node scripts/sn_radar_v2.mjs --tier ${{ steps.tier.outputs.tier }} > /tmp/sn_radar.out 2>&1 || true
          cat /tmp/sn_radar.out
          
          # Polar Radar (New)
          OUT_DIR=data/polar_opportunities \
          node scripts/polar_radar.mjs > /tmp/polar_radar.out 2>&1 || true
          cat /tmp/polar_radar.out
          
          LATEST_SN=$(ls -t data/sn_opportunities/sn_*.tsv 2>/dev/null | head -1)
          if [ -n "$LATEST_SN" ]; then
            BOUNTIES_SN=$(awk -F'\t' '$11 ~ /OPEN_BOUNTY/' "$LATEST_SN" | head -5)
            echo "bounties_sn<<EOF" >> $GITHUB_OUTPUT
            echo "$BOUNTIES_SN" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          
          LATEST_POLAR=$(ls -t data/polar_opportunities/polar_*.tsv 2>/dev/null | head -1)
          if [ -n "$LATEST_POLAR" ]; then
            BOUNTIES_POLAR=$(awk -F'\t' '$3 ~ /FUNDED/' "$LATEST_POLAR" | head -5)
            echo "bounties_polar<<EOF" >> $GITHUB_OUTPUT
            echo "$BOUNTIES_POLAR" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ || true
          git diff --cached --quiet || git commit -m "sn_radar v2 tier=${{ steps.tier.outputs.tier }} $(date -u +%FT%TZ)"
          git push || true

      - name: Open issue if open SN bounty found
        if: steps.radar.outputs.bounties_sn != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `New SN OPEN_BOUNTY detected:\n\n\`\`\`\n${{ steps.radar.outputs.bounties_sn }}\n\`\`\``;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[radar] SN open bounty ${new Date().toISOString().slice(0,16)}`,
              body,
              labels: ['radar', 'sn', 'bounty']
            });

      - name: Open issue if open Polar bounty found
        if: steps.radar.outputs.bounties_polar != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `New POLAR funded issues detected:\n\n\`\`\`\n${{ steps.radar.outputs.bounties_polar }}\n\`\`\``;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[radar] POLAR open bounty ${new Date().toISOString().slice(0,16)}`,
              body,
              labels: ['radar', 'polar', 'bounty']
            });

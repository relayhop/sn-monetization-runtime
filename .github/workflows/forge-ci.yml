name: Forge CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Forge Build
        run: forge build

      - name: Forge Test
        run: forge test
